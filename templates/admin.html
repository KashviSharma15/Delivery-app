<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Approve Pharmacists</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .admin-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #b91c1c;
            transform: translateY(-2px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .pending-icon { background: #fef3c7; }
        .approved-icon { background: #d1fae5; }
        .rejected-icon { background: #fee2e2; }

        .stat-content {
            flex: 1;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .pending-number { color: #d97706; }
        .approved-number { color: #059669; }
        .rejected-number { color: #dc2626; }

        .stat-label {
            color: #666;
            font-size: 16px;
        }

        .main-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 3px solid #f0f0f0;
        }

        .section-title {
            font-size: 26px;
            font-weight: bold;
            color: #333;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .tab {
            padding: 12px 24px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .pharmacist-card {
            background: white;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .pharmacist-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }

        .pharmacist-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .pharmacist-info {
            flex: 1;
        }

        .pharmacist-name {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .pharmacist-username {
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-approved {
            background: #d1fae5;
            color: #065f46;
        }

        .status-rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        .pharmacist-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .detail-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .detail-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #333;
            font-size: 15px;
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .approve-btn {
            flex: 1;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .approve-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .reject-btn {
            flex: 1;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .reject-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #666;
        }

        .empty-state p {
            color: #999;
            font-size: 16px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.success {
            border-left: 5px solid #10b981;
        }

        .toast.error {
            border-left: 5px solid #ef4444;
        }

        .toast-icon {
            font-size: 28px;
        }

        .toast-message {
            font-weight: 600;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="toast" id="toast">
        <div class="toast-icon" id="toastIcon"></div>
        <div class="toast-message" id="toastMessage"></div>
    </div>

    <div class="header">
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="logo">🛡️ Admin Panel</div>
            <div class="admin-badge">👑 Administrator</div>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon pending-icon">⏳</div>
            <div class="stat-content">
                <div class="stat-number pending-number" id="pendingCount">0</div>
                <div class="stat-label">Pending Approval</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon approved-icon">✅</div>
            <div class="stat-content">
                <div class="stat-number approved-number" id="approvedCount">0</div>
                <div class="stat-label">Approved</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon rejected-icon">❌</div>
            <div class="stat-content">
                <div class="stat-number rejected-number" id="rejectedCount">0</div>
                <div class="stat-label">Rejected</div>
            </div>
        </div>
    </div>

    <div class="main-section">
        <div class="section-header">
            <div class="section-title">👥 Pharmacist Management</div>
            <button class="refresh-btn" onclick="loadPharmacists()">
                🔄 Refresh
            </button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="filterPharmacists('pending')">⏳ Pending</div>
            <div class="tab" onclick="filterPharmacists('approved')">✅ Approved</div>
            <div class="tab" onclick="filterPharmacists('rejected')">❌ Rejected</div>
            <div class="tab" onclick="filterPharmacists('all')">📋 All</div>
        </div>

        <div id="pharmacistsContainer"></div>
    </div>

    <script>
    let allPharmacists = [];
    let currentFilter = 'pending';

    // Load pharmacists on page load
    document.addEventListener('DOMContentLoaded', () => {
        loadPharmacists();
    });

    async function loadPharmacists() {
        try {
            const response = await fetch('/api/admin/pharmacists');
            const data = await response.json();
            
            if (data.success) {
                allPharmacists = data.pharmacists;
                updateStats();
                displayPharmacists();
            } else {
                showToast('error', 'Error loading pharmacists');
            }
        } catch (error) {
            console.error('Error loading pharmacists:', error);
            showToast('error', 'Error loading data');
        }
    }

    function updateStats() {
        const pending = allPharmacists.filter(p => p.status === 'pending').length;
        const approved = allPharmacists.filter(p => p.status === 'approved').length;
        const rejected = allPharmacists.filter(p => p.status === 'rejected').length;
        
        document.getElementById('pendingCount').textContent = pending;
        document.getElementById('approvedCount').textContent = approved;
        document.getElementById('rejectedCount').textContent = rejected;
    }

    function filterPharmacists(filter) {
        currentFilter = filter;
        
        // Update tab styling
        document.querySelectorAll('.tab').forEach(tab => {
            tab.classList.remove('active');
        });
        event.target.classList.add('active');
        
        displayPharmacists();
    }

    function displayPharmacists() {
        const container = document.getElementById('pharmacistsContainer');
        
        let filtered = allPharmacists;
        if (currentFilter !== 'all') {
            filtered = allPharmacists.filter(p => p.status === currentFilter);
        }
        
        if (filtered.length === 0) {
            const emptyMessages = {
                pending: { icon: '⏳', title: 'No Pending Requests', text: 'All pharmacists have been reviewed' },
                approved: { icon: '✅', title: 'No Approved Pharmacists', text: 'Approve pharmacists to see them here' },
                rejected: { icon: '❌', title: 'No Rejected Pharmacists', text: 'Rejected pharmacists will appear here' },
                all: { icon: '👥', title: 'No Pharmacists', text: 'No pharmacist registrations yet' }
            };
            
            const msg = emptyMessages[currentFilter];
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">${msg.icon}</div>
                    <h3>${msg.title}</h3>
                    <p>${msg.text}</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = filtered.map(pharmacist => `
            <div class="pharmacist-card">
                <div class="pharmacist-header">
                    <div class="pharmacist-info">
                        <div class="pharmacist-name">🏥 ${pharmacist.pharmacyName || 'Unnamed Pharmacy'}</div>
                        <div class="pharmacist-username">@${pharmacist.username}</div>
                        <div class="info-row">
                            👤 ${pharmacist.full_name || 'No name'}
                        </div>
                        <div class="info-row">
                            📧 ${pharmacist.email || 'No email'}
                        </div>
                        <div class="info-row">
                            📱 ${pharmacist.phone || 'No phone'}
                        </div>
                    </div>
                    <div class="status-badge status-${pharmacist.status}">
                        ${pharmacist.status === 'pending' ? '⏳ Pending' : 
                          pharmacist.status === 'approved' ? '✅ Approved' : 
                          '❌ Rejected'}
                    </div>
                </div>
                
                <div class="pharmacist-details">
                    <div class="detail-box">
                        <div class="detail-label">Address</div>
                        <div class="detail-value">${pharmacist.address || 'Not provided'}, ${pharmacist.city || ''}</div>
                    </div>
                    <div class="detail-box">
                        <div class="detail-label">License</div>
                        <div class="detail-value">${pharmacist.license || 'N/A'}</div>
                    </div>
                    <div class="detail-box">
                        <div class="detail-label">Registration</div>
                        <div class="detail-value">${pharmacist.registration || 'N/A'}</div>
                    </div>
                    <div class="detail-box">
                        <div class="detail-label">Qualification</div>
                        <div class="detail-value">${pharmacist.qualification || 'N/A'}</div>
                    </div>
                    <div class="detail-box">
                        <div class="detail-label">Experience</div>
                        <div class="detail-value">${pharmacist.experience || 'N/A'}</div>
                    </div>
                    <div class="detail-box">
                        <div class="detail-label">Registered</div>
                        <div class="detail-value">${formatDate(pharmacist.registeredAt)}</div>
                    </div>
                </div>
                
                ${pharmacist.status === 'pending' ? `
                    <div class="action-buttons">
                        <button class="approve-btn" onclick="approvePharmacist(${pharmacist.id})">
                            ✅ Approve
                        </button>
                        <button class="reject-btn" onclick="rejectPharmacist(${pharmacist.id})">
                            ❌ Reject
                        </button>
                    </div>
                ` : pharmacist.status === 'rejected' ? `
                    <div class="action-buttons">
                        <button class="approve-btn" onclick="approvePharmacist(${pharmacist.id})">
                            ✅ Approve Anyway
                        </button>
                    </div>
                ` : `
                    <div class="action-buttons">
                        <button class="reject-btn" onclick="rejectPharmacist(${pharmacist.id})">
                            ❌ Revoke Approval
                        </button>
                    </div>
                `}
            </div>
        `).join('');
    }

    async function approvePharmacist(userId) {
        if (!confirm(`Approve this pharmacist?`)) return;
        
        try {
            const response = await fetch(`/api/admin/pharmacists/${userId}/approve`, {
                method: 'POST'
            });
            
            const data = await response.json();
            
            if (data.success) {
                showToast('success', '✅ Pharmacist approved successfully!');
                loadPharmacists(); // Reload the list
            } else {
                showToast('error', 'Error approving pharmacist');
            }
        } catch (error) {
            console.error('Error:', error);
            showToast('error', 'Error approving pharmacist');
        }
    }

    async function rejectPharmacist(userId) {
        if (!confirm(`Reject this pharmacist?`)) return;
        
        try {
            const response = await fetch(`/api/admin/pharmacists/${userId}/reject`, {
                method: 'POST'
            });
            
            const data = await response.json();
            
            if (data.success) {
                showToast('error', '❌ Pharmacist rejected');
                loadPharmacists(); // Reload the list
            } else {
                showToast('error', 'Error rejecting pharmacist');
            }
        } catch (error) {
            console.error('Error:', error);
            showToast('error', 'Error rejecting pharmacist');
        }
    }

    function formatDate(timestamp) {
        if (!timestamp) return 'Unknown';
        const date = new Date(timestamp);
        return date.toLocaleDateString('en-US', { 
            year: 'numeric', 
            month: 'short', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function showToast(type, message) {
        const toast = document.getElementById('toast');
        const icon = document.getElementById('toastIcon');
        const msg = document.getElementById('toastMessage');
        
        toast.className = `toast ${type}`;
        icon.textContent = type === 'success' ? '✅' : '❌';
        msg.textContent = message;
        
        toast.style.display = 'flex';
        
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    function logout() {
        if (confirm('Logout from admin panel?')) {
            window.location.href = '/logout';
        }
    }
</script>
</body>
</html>
